<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Cart | Smart Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-28 md:pt-32 pb-24 px-4 md:px-8 max-w-7xl mx-auto w-full flex-grow">
        <header class="mb-10 md:mb-14">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-2 font-heading" id="cart-count">Your Cart</h1>
            <p class="text-slate-500 text-lg font-medium">Review your selected items and proceed to checkout.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12 items-start">
            <!-- Product List -->
            <section class="lg:col-span-8 space-y-5" id="cart-items-container">
            </section>

            <!-- Order Summary -->
            <aside class="lg:col-span-4 sticky top-28">
                <div class="bg-white rounded-[2rem] p-8 shadow-xl shadow-slate-200/50 border border-slate-200/60 relative overflow-hidden">
                    <div class="absolute -right-20 -top-20 w-48 h-48 bg-indigo-500/5 blur-3xl rounded-full"></div>
                    <h2 class="text-2xl font-extrabold tracking-tight text-slate-900 mb-8 font-heading">Order Summary</h2>
                    <div class="space-y-5 mb-8 relative z-10">
                        <div class="flex justify-between items-center text-slate-500 font-medium">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="font-bold text-slate-900 text-lg">₹0</span>
                        </div>
                        <div class="flex justify-between items-center text-slate-500 font-medium">
                            <span>Shipping</span>
                            <span class="font-bold text-green-500 bg-green-50 px-3 py-1 rounded-full text-xs uppercase tracking-widest border border-green-100">Free</span>
                        </div>
                        <div class="flex justify-between items-center text-slate-500 font-medium pb-5 border-b border-slate-100">
                            <span>Tax (18% GST)</span>
                            <span id="cart-tax" class="font-bold text-slate-900">₹0</span>
                        </div>
                        <div class="flex justify-between items-baseline pt-2">
                            <span class="text-lg font-bold text-slate-800">Total</span>
                            <span id="cart-total" class="text-4xl font-black tracking-tighter text-indigo-600 font-heading">₹0</span>
                        </div>
                    </div>
                    
                    <a href="checkout.html" class="block w-full py-5 rounded-[1rem] bg-slate-900 text-white font-bold text-lg tracking-wide text-center hover:bg-indigo-600 hover:shadow-[0_10px_20px_-10px_rgba(79,70,229,0.6)] transition-all hover:-translate-y-1 relative z-10">
                        Proceed to Checkout
                    </a>
                    
                    <div class="flex items-center justify-center gap-2 text-slate-400 text-xs font-bold uppercase tracking-widest mt-6">
                        <span class="material-symbols-outlined text-[16px]">lock</span>
                        <span>Secure SSL Checkout</span>
                    </div>
                </div>
                
                <div class="mt-8 flex items-center gap-5 px-6 py-4 bg-indigo-50 rounded-[1.5rem] text-indigo-900 border border-indigo-100/50">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center flex-shrink-0 shadow-sm text-indigo-500">
                        <span class="material-symbols-outlined text-[24px]">local_shipping</span>
                    </div>
                    <div>
                        <p class="font-extrabold text-sm font-heading">Free Express Delivery</p>
                        <p class="text-xs font-medium text-indigo-500 mt-0.5">Delivered within 5-7 business days.</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
