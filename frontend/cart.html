<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Cart | Smart Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-28 md:pt-32 pb-24 px-4 md:px-8 max-w-7xl mx-auto w-full flex-grow">
        <header class="mb-8 md:mb-12">
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter text-on-surface mb-2" id="cart-count">Your Cart</h1>
            <p class="text-on-surface-variant text-base md:text-lg">Review your selected items and proceed to checkout.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12 items-start">
            <!-- Product List -->
            <section class="lg:col-span-8 space-y-4" id="cart-items-container">
            </section>

            <!-- Order Summary -->
            <aside class="lg:col-span-4 sticky top-28">
                <div class="bg-surface-container-low rounded-lg p-6 md:p-8 shadow-sm">
                    <h2 class="text-xl md:text-2xl font-bold tracking-tight text-on-surface mb-6 md:mb-8">Order Summary</h2>
                    <div class="space-y-4 mb-6 md:mb-8">
                        <div class="flex justify-between text-on-surface-variant">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="font-medium text-on-surface">₹0</span>
                        </div>
                        <div class="flex justify-between text-on-surface-variant">
                            <span>Shipping</span>
                            <span class="font-medium text-primary">Free</span>
                        </div>
                        <div class="flex justify-between text-on-surface-variant">
                            <span>Tax (18% GST)</span>
                            <span id="cart-tax" class="font-medium text-on-surface">₹0</span>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-outline-variant/30 mb-6 md:mb-8">
                        <div class="flex justify-between items-baseline">
                            <span class="text-lg font-bold text-on-surface">Total</span>
                            <span id="cart-total" class="text-2xl md:text-3xl font-black tracking-tighter text-on-surface">₹0</span>
                        </div>
                    </div>
                    <a href="checkout.html" class="block w-full py-4 md:py-5 rounded-full signature-gradient text-on-primary font-bold text-base md:text-lg tracking-tight text-center hover:shadow-lg hover:shadow-primary/20 transition-all active:scale-95 mb-4 md:mb-6">
                        Proceed to Checkout
                    </a>
                    <div class="flex items-center justify-center gap-2 text-on-surface-variant text-sm">
                        <span class="material-symbols-outlined text-base">lock</span>
                        <span>Secure SSL Encryption</span>
                    </div>
                </div>
                <div class="mt-6 md:mt-8 flex items-center gap-4 px-4 text-on-surface-variant">
                    <span class="material-symbols-outlined text-3xl">local_shipping</span>
                    <div>
                        <p class="font-bold text-sm text-on-surface">Free Express Delivery</p>
                        <p class="text-xs">Delivered within 5-7 business days.</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
