<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Category | Smart Shop</title>
    <meta name="description" content="Browse products by category on Smart Shop"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-28 md:pt-32 pb-24 max-w-7xl mx-auto w-full px-4 md:px-8 flex-grow">
        <!-- Category Header -->
        <header class="mb-10 md:mb-14">
            <nav class="flex mb-6 text-[10px] font-bold tracking-[0.2em] uppercase text-slate-400">
                <a href="index.html" class="hover:text-indigo-600 transition-colors">Home</a>
                <span class="mx-3 text-slate-300">/</span>
                <span id="breadcrumb-cat" class="text-slate-600">Category</span>
            </nav>
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 bg-white p-8 rounded-[2rem] border border-slate-200/60 shadow-sm relative overflow-hidden">
                <div class="absolute right-0 top-0 w-64 h-64 bg-indigo-50/50 blur-3xl rounded-full pointer-events-none translate-x-1/2 -translate-y-1/2"></div>
                <div class="relative z-10">
                    <h1 id="category-title" class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-2 font-heading">Category</h1>
                    <p id="category-desc" class="text-slate-500 font-medium text-lg">Explore products in this category</p>
                </div>
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5 relative z-10">
                    <p id="cat-results" class="text-sm font-bold text-slate-500 bg-slate-50 px-4 py-2 rounded-full border border-slate-100"></p>
                    <select id="cat-sort" class="w-full sm:w-auto bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-[1rem] px-5 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none shadow-sm cursor-pointer hover:bg-slate-50 transition-colors">
                        <option value="popularity">🔥 Popular</option>
                        <option value="price-low">📈 Price: Low to High</option>
                        <option value="price-high">📉 Price: High to Low</option>
                        <option value="rating">⭐ Highest Rated</option>
                    </select>
                </div>
            </div>
        </header>

        <div id="cat-products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-5">
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('cat') || urlParams.get('category') || '';
            
            const catMeta = {
                'Mobiles': { title: 'Mobiles & Smartphones', desc: 'Latest phones from Apple, Samsung, OnePlus & more' },
                'Laptops': { title: 'Laptops & Computers', desc: 'Powerful laptops for work, gaming & everyday use' },
                'Clothes': { title: 'Fashion & Apparel', desc: 'Trending styles, premium brands at best prices' },
                'Grocery': { title: 'Grocery & Essentials', desc: 'Fresh groceries, organic foods & daily needs' },
                'Accessories': { title: 'Accessories & Wearables', desc: 'Headphones, watches, cases & more' }
            };
            
            const meta = catMeta[cat] || { title: cat || 'All Products', desc: 'Explore our complete product range' };
            document.getElementById('category-title').textContent = meta.title;
            document.getElementById('category-desc').textContent = meta.desc;
            document.getElementById('breadcrumb-cat').textContent = meta.title;
            document.title = `${meta.title} | Smart Shop`;
            
            const grid = document.getElementById('cat-products-grid');
            const sortSelect = document.getElementById('cat-sort');
            const resultsLabel = document.getElementById('cat-results');
            
            function render() {
                let products = cat ? PRODUCTS.filter(p => p.category === cat) : PRODUCTS;
                products = sortProducts(products, sortSelect.value);
                
                resultsLabel.innerHTML = `<span class="font-bold text-primary">${products.length}</span> products`;
                grid.innerHTML = '';
                products.forEach((p, idx) => {
                    const wrapper = document.createElement('div');
                    wrapper.style.opacity = '0';
                    wrapper.style.animation = `fadeUp 0.4s ease ${idx * 30}ms forwards`;
                    wrapper.innerHTML = generateProductCard(p);
                    grid.appendChild(wrapper);
                });
                updateWishlistButtons();
            }
            
            sortSelect.addEventListener('change', render);
            render();
        });
    </script>
</body>
</html>
