<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Smart Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">

<main class="min-h-screen flex flex-col md:flex-row">
    <!-- Left Section: Brand -->
    <section class="hidden md:flex md:w-1/2 relative overflow-hidden bg-surface-container-highest">
        <div class="absolute inset-0 z-0">
            <img alt="Shopping" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=1400&q=80&fit=crop"/>
            <div class="absolute inset-0 bg-gradient-to-tr from-primary/30 to-secondary/20"></div>
        </div>
        <div class="relative z-10 p-12 flex flex-col justify-between w-full h-full">
            <div><a href="index.html" class="text-3xl font-bold tracking-tighter text-white drop-shadow-md">Smart Shop</a></div>
            <div class="glass-panel p-10 rounded-lg max-w-md border border-white/20">
                <h1 class="text-4xl font-bold tracking-tight text-on-surface mb-4">Elevate your daily essentials.</h1>
                <p class="text-on-surface-variant leading-relaxed">Join a curated community of modern shoppers focused on quality, precision, and architectural design.</p>
            </div>
        </div>
    </section>

    <!-- Right Section: Login Form -->
    <section class="flex-1 flex flex-col items-center justify-center p-6 md:p-16 lg:p-24 bg-surface">
        <div class="md:hidden mb-12 text-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-primary">Smart Shop</a>
        </div>

        <div class="w-full max-w-[420px] space-y-8">
            <div class="text-center md:text-left space-y-4">
                <h2 class="text-3xl font-bold tracking-tight text-on-surface">Welcome back</h2>
                <p class="text-on-surface-variant">Access your curated collection and recent orders.</p>
            </div>

            <div id="login-error" class="hidden p-3 rounded-lg bg-red-50 text-red-600 text-sm font-medium"></div>

            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="form-label ml-1">Email Address</label>
                    <input id="login-email" class="form-input" placeholder="name@example.com" type="email" required/>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="form-label">Password</label>
                        <a class="text-xs font-medium text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
                    </div>
                    <input id="login-password" class="form-input" placeholder="••••••••" type="password" required/>
                </div>
                <button id="login-btn" class="w-full py-4 px-6 rounded-full signature-gradient text-on-primary font-bold tracking-tight shadow-md hover:scale-[1.02] active:scale-[0.98] transition-all text-lg border-none cursor-pointer" type="submit">
                    Sign In
                </button>
            </form>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-outline-variant/30"></div>
                <span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-outline">OR</span>
                <div class="flex-grow border-t border-outline-variant/30"></div>
            </div>

            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-full bg-white text-slate-800 border-2 border-slate-200 hover:border-slate-300 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 font-bold text-sm cursor-pointer active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.27.81-.57z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>

            <p class="text-center text-sm text-on-surface-variant pt-2">
                Don't have an account? <a class="font-semibold text-primary hover:text-secondary transition-colors" href="signup.html">Create one for free</a>
            </p>
        </div>
    </section>
</main>

<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script type="module">
    import { loginWithGoogle } from './js/firebase-auth.js?v=2';
    
    const errorBox = document.getElementById('login-error');

    // Email/Password Login
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        errorBox.classList.add('hidden');
        const btn = document.getElementById('login-btn');
        const originalText = btn.textContent;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin-slow text-lg">sync</span>';
        btn.disabled = true;

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            const profile = await AuthAPI.login(email, password);
            if (typeof showWelcomeAnimation === 'function') {
                showWelcomeAnimation(profile.name.split(' ')[0]);
                setTimeout(function() { window.location.href = 'index.html'; }, 2000);
            } else {
                setTimeout(function() { window.location.href = 'index.html'; }, 600);
            }
        } catch(err) {
            errorBox.textContent = err.message || 'Login failed. Please check your credentials.';
            errorBox.classList.remove('hidden');
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });

    // Google Login
    document.getElementById('google-login-btn').addEventListener('click', async function() {
        const btn = this;
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin-slow text-lg">sync</span> Signing in...';
        btn.disabled = true;

        try {
            const fbUser = await loginWithGoogle();
            const profile = await AuthAPI.googleLogin(fbUser.name, fbUser.email, fbUser.uid, fbUser.photoURL);
            
            if (typeof showWelcomeAnimation === 'function') {
                showWelcomeAnimation(profile.name.split(' ')[0]);
                setTimeout(function() { window.location.href = 'index.html'; }, 2000);
            } else {
                setTimeout(function() { window.location.href = 'index.html'; }, 600);
            }
        } catch(err) {
            errorBox.textContent = err.message || 'Google sign-in failed.';
            errorBox.classList.remove('hidden');
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
