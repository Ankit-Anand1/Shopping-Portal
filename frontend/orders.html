<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Orders | Smart Shop</title>
    <meta name="description" content="Track your Smart Shop orders"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-28 md:pt-32 pb-24 max-w-[1100px] mx-auto w-full px-4 md:px-8 flex-grow animate-fade-up">
        
        <div class="flex flex-col md:flex-row items-start md:items-end justify-between mb-10 md:mb-14 gap-6">
            <div>
                <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter text-slate-900 mb-2 font-heading">My Orders</h1>
                <p class="text-slate-500 text-base md:text-lg font-medium">Track and manage your purchases in real-time</p>
            </div>
            <a href="shop.html" class="px-6 py-3 bg-white text-slate-700 hover:text-indigo-600 rounded-full font-bold shadow-sm border border-slate-200/60 hover:border-indigo-200 hover:bg-indigo-50 hover:-translate-y-0.5 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">shopping_bag</span> Continue Shopping
            </a>
        </div>

        <div id="orders-container">
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('orders-container');
            const orders = getOrders();
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-[2rem] p-12 md:p-20 shadow-sm border border-slate-200/60 flex flex-col items-center justify-center text-center animate-fade-up">
                        <div class="w-24 h-24 rounded-[1.5rem] bg-indigo-50 flex items-center justify-center mb-6 shadow-inner border border-indigo-100">
                            <span class="material-symbols-outlined text-indigo-400" style="font-size: 48px;">receipt_long</span>
                        </div>
                        <h3 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-3 font-heading tracking-tight">No orders yet</h3>
                        <p class="text-slate-500 font-medium mb-8 max-w-md">Looks like you haven't made any purchases yet. Discover something beautiful!</p>
                        <a href="shop.html" class="px-8 py-4 bg-indigo-600 text-white rounded-full font-bold shadow-lg shadow-indigo-600/30 hover:bg-indigo-700 hover:-translate-y-1 transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-[20px]">explore</span> Start Shopping
                        </a>
                    </div>
                `;
                return;
            }
            
            // Refresh order statuses
            orders.forEach(order => {
                const elapsed = Date.now() - new Date(order.date).getTime();
                const stepDelays = [0, 10000, 25000, 45000, 70000];
                const statuses = ['Ordered', 'Packed', 'Shipped', 'Out for Delivery', 'Delivered'];
                
                for (let i = 0; i < stepDelays.length; i++) {
                    if (elapsed >= stepDelays[i]) {
                        order.trackingSteps[i].completed = true;
                        if (!order.trackingSteps[i].date) {
                            order.trackingSteps[i].date = new Date(new Date(order.date).getTime() + stepDelays[i]).toISOString();
                        }
                        order.status = statuses[i];
                    }
                }
            });
            saveOrders(orders);
            
            orders.forEach((order, orderIdx) => {
                const statusColor = order.status === 'Delivered' ? 'badge-success' : 
                                    order.status === 'Shipped' || order.status === 'Out for Delivery' ? 'badge-primary' : 
                                    'badge-warning';
                const statusIcon = order.status === 'Delivered' ? 'check_circle' : 
                                   order.status === 'Shipped' ? 'local_shipping' :
                                   order.status === 'Out for Delivery' ? 'delivery_dining' :
                                   order.status === 'Packed' ? 'inventory_2' : 'receipt';
                
                const tax = Math.round(order.total * 0.18);
                                   
                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-200/60 mb-8 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 animate-fade-up" style="animation-delay: ${orderIdx * 100}ms">
                        <!-- Order Header -->
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 pb-6 border-b border-slate-100">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="font-extrabold text-xl text-slate-900 font-heading">Order ${order.id}</h3>
                                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${order.status === 'Delivered' ? 'bg-green-50 text-green-600 border border-green-200/50' : order.status === 'Shipped' || order.status === 'Out for Delivery' ? 'bg-indigo-50 text-indigo-600 border border-indigo-200/50' : 'bg-orange-50 text-orange-600 border border-orange-200/50'} flex items-center gap-1">
                                        <span class="material-symbols-outlined" style="font-size:14px;">${statusIcon}</span>
                                        ${order.status}
                                    </span>
                                </div>
                                <p class="text-sm text-slate-500 font-medium">
                                    Ordered on ${new Date(order.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}
                                    &middot; <span class="font-bold text-slate-700">${order.items.length} item${order.items.length > 1 ? 's' : ''}</span>
                                    &middot; Total: <span class="font-black text-indigo-600">${formatPrice(order.total + tax)}</span>
                                </p>
                            </div>
                            <div class="md:text-right bg-slate-50 px-4 py-3 rounded-xl border border-slate-100">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Expected Delivery</p>
                                <p class="font-extrabold text-slate-800 text-lg font-heading">${new Date(order.deliveryDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
                            </div>
                        </div>
                        
                        <!-- Order Items -->
                        <div class="space-y-4 mb-8">
                            <h4 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-2">Items</h4>
                            ${order.items.map(item => `
                                <div class="flex items-center gap-4 cursor-pointer hover:bg-slate-50 rounded-xl p-3 -mx-3 transition-colors border border-transparent hover:border-slate-100" onclick="window.location.href='product.html?id=${item.productId}'">
                                    <div class="w-16 h-16 bg-slate-100 rounded-xl overflow-hidden p-2 flex-shrink-0 border border-slate-200/50 shadow-inner">
                                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain mix-blend-multiply transition-transform hover:scale-110"/>
                                    </div>
                                    <div class="flex-grow min-w-0">
                                        <h4 class="font-extrabold text-sm text-slate-800 truncate">${item.name}</h4>
                                        <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">${item.brand} &middot; Qty: ${item.quantity}</span>
                                    </div>
                                    <span class="font-black text-slate-900 flex-shrink-0 text-base bg-white px-3 py-1.5 rounded-lg border border-slate-100 shadow-sm">${formatPrice(item.price * item.quantity)}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <!-- Order Tracking -->
                        <div class="bg-indigo-50/30 rounded-[1.5rem] p-6 md:p-8 border border-indigo-100/50 relative overflow-hidden">
                            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500/10 blur-3xl rounded-full"></div>
                            <h4 class="font-extrabold text-[11px] text-indigo-600 uppercase tracking-[0.2em] mb-8 flex items-center gap-2">
                                <span class="material-symbols-outlined bg-white text-indigo-600 w-8 h-8 rounded-full flex items-center justify-center shadow-sm" style="font-size:18px;">timeline</span>
                                Order Tracking
                            </h4>
                            <div class="space-y-0 relative z-10">
                                ${order.trackingSteps.map((step, idx) => {
                                    const isLast = idx === order.trackingSteps.length - 1;
                                    const isCurrent = step.completed && (isLast || !order.trackingSteps[idx + 1].completed);
                                    const dotClass = step.completed ? (isCurrent ? 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.4)] scale-110' : 'bg-green-500 text-white shadow-md') : 'bg-white border-2 border-slate-200 text-slate-300';
                                    const stepClass = step.completed && !isLast && order.trackingSteps[idx + 1]?.completed ? 'border-green-500' : 'border-slate-200';
                                    const icons = ['receipt', 'inventory_2', 'local_shipping', 'delivery_dining', 'check_circle'];
                                    
                                    return `
                                        <div class="flex gap-6 pb-10 ${isLast ? 'pb-0' : ''} relative group">
                                            ${!isLast ? `<div class="absolute left-[19px] top-[40px] bottom-0 w-0.5 bg-slate-200 rounded-full overflow-hidden">
                                                <div class="w-full transition-all duration-1000 ${step.completed && order.trackingSteps[idx + 1]?.completed ? 'h-full bg-green-500' : (isCurrent ? 'h-1/2 bg-indigo-600 animate-pulse shadow-[0_0_10px_rgba(79,70,229,0.5)]' : 'h-0 bg-transparent')}"></div>
                                            </div>` : ''}
                                            <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-all duration-500 ${dotClass} relative z-10 ${isCurrent ? 'ring-4 ring-indigo-100 animate-pulse' : ''}">
                                                <span class="material-symbols-outlined" style="font-size:20px; ${step.completed ? "font-variation-settings: 'FILL' 1;" : ''}">${icons[idx]}</span>
                                            </div>
                                            <div class="pt-2">
                                                <h5 class="font-extrabold text-sm ${step.completed ? 'text-slate-900' : 'text-slate-400'}">${step.status}</h5>
                                                ${step.date ? `<p class="text-[11px] font-medium text-slate-500 mt-1 uppercase tracking-wider">${new Date(step.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>` : '<p class="text-[11px] font-medium text-slate-300 mt-1 uppercase tracking-wider">Pending</p>'}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
