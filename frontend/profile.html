<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Profile | Smart Shop</title>
    <meta name="description" content="Manage your Smart Shop profile"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-28 md:pt-32 pb-24 max-w-[900px] mx-auto w-full px-4 md:px-8 flex-grow">
        
        <!-- Profile Header -->
        <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-[2.5rem] p-8 md:p-12 mb-8 text-center shadow-[0_20px_40px_-15px_rgba(79,70,229,0.4)] relative overflow-hidden text-white border border-white/10" data-aos="fade-down">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
            <div class="w-24 h-24 rounded-[1.2rem] bg-white/20 backdrop-blur-md mx-auto mb-5 text-4xl font-extrabold flex items-center justify-center shadow-lg border border-white/30" id="profile-avatar">U</div>
            <h1 id="profile-name" class="text-3xl md:text-4xl font-extrabold mb-1 font-heading tracking-tight drop-shadow-sm">User</h1>
            <p id="profile-email" class="text-indigo-100 text-sm mb-10 font-medium">user@smartshop.in</p>
            
            <div class="flex justify-center gap-12 md:gap-24 relative z-10 bg-white/10 backdrop-blur-md rounded-2xl w-fit mx-auto p-6 border border-white/20 shadow-inner">
                <div class="text-center">
                    <span id="stat-orders" class="text-4xl font-black block font-heading">0</span>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] mt-2 text-indigo-100">Orders</p>
                </div>
                <div class="text-center">
                    <span id="stat-wishlist" class="text-4xl font-black block font-heading">0</span>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] mt-2 text-indigo-100">Wishlist</p>
                </div>
                <div class="text-center">
                    <span id="stat-cart" class="text-4xl font-black block font-heading">0</span>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] mt-2 text-indigo-100">In Cart</p>
                </div>
            </div>
        </div>

        <!-- Quick Links -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8" data-aos="fade-up" data-aos-delay="100">
            <a href="orders.html" class="bg-white rounded-[1.5rem] p-6 cursor-pointer flex items-center gap-5 shadow-sm border border-slate-200/60 hover:shadow-xl hover:-translate-y-1 transition-all group">
                <div class="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform group-hover:bg-indigo-600">
                    <span class="material-symbols-outlined text-indigo-600 group-hover:text-white transition-colors" style="font-size:28px;">local_shipping</span>
                </div>
                <div>
                    <h3 class="font-extrabold text-[15px] text-slate-800 font-heading">My Orders</h3>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Track purchases</p>
                </div>
            </a>
            <a href="wishlist.html" class="bg-white rounded-[1.5rem] p-6 cursor-pointer flex items-center gap-5 shadow-sm border border-slate-200/60 hover:shadow-xl hover:-translate-y-1 transition-all group">
                <div class="w-14 h-14 rounded-2xl bg-pink-50 flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform group-hover:bg-pink-500">
                    <span class="material-symbols-outlined text-pink-500 group-hover:text-white transition-colors" style="font-size:28px;">favorite</span>
                </div>
                <div>
                    <h3 class="font-extrabold text-[15px] text-slate-800 font-heading">Wishlist</h3>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Saved items</p>
                </div>
            </a>
            <a href="cart.html" class="bg-white rounded-[1.5rem] p-6 cursor-pointer flex items-center gap-5 shadow-sm border border-slate-200/60 hover:shadow-xl hover:-translate-y-1 transition-all group">
                <div class="w-14 h-14 rounded-2xl bg-green-50 flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform group-hover:bg-green-500">
                    <span class="material-symbols-outlined text-green-500 group-hover:text-white transition-colors" style="font-size:28px;">shopping_bag</span>
                </div>
                <div>
                    <h3 class="font-extrabold text-[15px] text-slate-800 font-heading">Cart</h3>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">View your bag</p>
                </div>
            </a>
        </div>
        
        <!-- Profile Form with Edit Toggle -->
        <div class="bg-white rounded-[2rem] p-8 md:p-10 mb-8 shadow-sm border border-slate-200/60" data-aos="fade-up" data-aos-delay="200">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-3 font-heading tracking-tight">
                    <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center shadow-inner border border-indigo-100/50"><span class="material-symbols-outlined text-[20px]">person</span></div>
                    Personal Information
                </h2>
                <!-- Edit Button (visible after saving) -->
                <button id="edit-btn" onclick="enableEdit()" style="display: none;" class="flex items-center gap-2 px-6 py-2.5 rounded-full bg-slate-100 text-slate-700 font-bold text-sm hover:bg-slate-200 hover:text-slate-900 transition-all cursor-pointer border border-slate-200 shadow-sm">
                    <span class="material-symbols-outlined text-[18px]">edit</span> Edit
                </button>
            </div>
            
            <form id="profile-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                        <input type="text" id="p-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Your full name"/>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                        <input type="email" id="p-email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="your@email.com"/>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Phone</label>
                        <input type="tel" id="p-phone" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="+91 98765 43210"/>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">City</label>
                        <input type="text" id="p-city" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="Mumbai"/>
                    </div>
                </div>
                
                <!-- Address Field -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Delivery Address</label>
                    <input type="text" id="p-address" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="123, MG Road, Sector 5"/>
                </div>
                
                <div class="flex items-center gap-4 pt-6 mt-2 border-t border-slate-100">
                    <button type="submit" id="save-btn" class="bg-indigo-600 text-white font-bold text-sm px-8 py-3.5 rounded-full hover:bg-indigo-700 shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] hover:-translate-y-0.5 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">save</span> Save Changes
                    </button>
                    <span id="save-status" class="text-sm text-green-600 font-bold hidden flex items-center gap-1.5 bg-green-50 px-4 py-2.5 rounded-full border border-green-100">
                        <span class="material-symbols-outlined text-[18px]">check_circle</span> Saved Successfully
                    </span>
                </div>
            </form>
        </div>
        
        <!-- Account Actions -->
        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200/60 flex flex-col md:flex-row md:items-center justify-between gap-6" data-aos="fade-up" data-aos-delay="300">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-red-50 text-red-500 flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-[24px]">warning</span>
                </div>
                <div>
                    <h3 class="font-extrabold text-slate-900 font-heading mb-1 tracking-tight">Danger Zone</h3>
                    <p class="text-xs text-slate-500 font-medium">Manage your account data and session.</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-4">
                <button onclick="handleLogout()" class="px-6 py-3 rounded-full bg-slate-100 text-slate-700 font-bold text-sm hover:bg-slate-200 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">logout</span> Sign Out
                </button>
                <button onclick="if(confirm('Clear all data? This cannot be undone.')) { localStorage.clear(); window.location.href='index.html'; }" class="px-6 py-3 rounded-full bg-white border border-red-200 text-red-500 font-bold text-sm hover:bg-red-50 hover:border-red-300 transition-all flex items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined text-[18px]">delete_sweep</span> Clear Data
                </button>
            </div>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        // FIX #3: Profile editing state
        let isEditing = true; // Start in edit mode if no profile
        
        document.addEventListener('DOMContentLoaded', () => {
            const profile = getProfile() || { name: '', email: '', phone: '', city: '' };
            const savedAddress = getAddress();
            
            document.getElementById('profile-name').textContent = profile.name || 'Smart Shop User';
            document.getElementById('profile-email').textContent = profile.email || 'user@smartshop.in';
            document.getElementById('profile-avatar').textContent = (profile.name || 'U')[0].toUpperCase();
            
            document.getElementById('p-name').value = profile.name || '';
            document.getElementById('p-email').value = profile.email || '';
            document.getElementById('p-phone').value = profile.phone || '';
            document.getElementById('p-city').value = profile.city || '';
            document.getElementById('p-address').value = savedAddress || '';
            
            document.getElementById('stat-orders').textContent = getOrders().length;
            document.getElementById('stat-wishlist').textContent = getWishlist().length;
            document.getElementById('stat-cart').textContent = getCartCount();
            
            // If profile already exists, lock fields + show edit button
            if (profile.name) {
                lockFields();
            }
        });
        
        // FIX #3: Lock fields after save
        function lockFields() {
            const fields = ['p-name', 'p-email', 'p-phone', 'p-city', 'p-address'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.disabled = true;
                    el.style.opacity = '0.7';
                }
            });
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('edit-btn').style.display = 'flex';
            isEditing = false;
        }
        
        // FIX #3: Enable editing
        function enableEdit() {
            const fields = ['p-name', 'p-email', 'p-phone', 'p-city', 'p-address'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.disabled = false;
                    el.style.opacity = '1';
                }
            });
            document.getElementById('save-btn').style.display = 'inline-flex';
            document.getElementById('edit-btn').style.display = 'none';
            document.getElementById('save-status').classList.add('hidden');
            document.getElementById('p-name').focus();
            isEditing = true;
        }
        
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const profileData = {
                name: document.getElementById('p-name').value,
                email: document.getElementById('p-email').value,
                phone: document.getElementById('p-phone').value,
                city: document.getElementById('p-city').value,
            };
            const addr = document.getElementById('p-address').value;

            // Save to localStorage (always works)
            saveProfile(profileData);
            if (addr) saveAddress(addr);

            // Also save to backend if API available
            if (typeof AuthAPI !== 'undefined') {
                try {
                    await AuthAPI.updateProfile({
                        name: profileData.name,
                        phone: profileData.phone,
                        address: {
                            street: addr,
                            city: profileData.city,
                            state: '',
                            zipCode: ''
                        }
                    });
                } catch(err) {
                    console.log('Backend save skipped:', err.message);
                }
            }
            
            // Update header
            document.getElementById('profile-name').textContent = profileData.name || 'Smart Shop User';
            document.getElementById('profile-email').textContent = profileData.email || 'user@smartshop.in';
            document.getElementById('profile-avatar').textContent = (profileData.name || 'U')[0].toUpperCase();
            
            // Show saved status + lock fields
            document.getElementById('save-status').classList.remove('hidden');
            lockFields();
            
            showToast('Profile Saved', 'Your profile has been updated.', 'check_circle', 'green');
            renderNavbar();
        });
    </script>
</body>
</html>
