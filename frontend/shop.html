<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shop | Smart Shop</title>
    <meta name="description" content="Browse and search premium products on Smart Shop"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-24 pb-20 px-4 md:px-8 max-w-7xl mx-auto w-full flex-grow">
        <!-- Search Header -->
        <header class="mb-8 md:mb-12">
            <nav class="flex mb-4 text-xs tracking-widest uppercase text-on-surface-variant font-medium">
                <a href="index.html" class="opacity-60 hover:text-primary transition-colors">Home</a>
                <span class="mx-2 opacity-30">/</span>
                <span>Shop</span>
            </nav>
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-on-surface mb-1" id="page-title">All Products</h1>
                    <p id="results-count" class="text-on-surface-variant text-sm md:text-base font-medium"></p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12">
            <!-- Sidebar Filters -->
            <aside class="lg:col-span-3 space-y-8">
                <!-- Category Filter -->
                <section>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface mb-4">Category</h3>
                    <select id="category-filter" class="form-select">
                        <option value="All">All Categories</option>
                        <option value="Mobiles">Mobiles</option>
                        <option value="Laptops">Laptops</option>
                        <option value="Clothes">Fashion</option>
                        <option value="Grocery">Grocery</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </section>

                <!-- Sort -->
                <section>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface mb-4">Sort By</h3>
                    <select id="sort-select" class="form-select">
                        <option value="popularity">Popularity</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Customer Rating</option>
                    </select>
                </section>

                <!-- Price Range -->
                <section>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface mb-4">Price Range</h3>
                    <div class="px-1">
                        <input type="range" id="price-range" min="0" max="500000" value="500000" step="1000"/>
                        <div class="flex justify-between mt-3 text-sm font-semibold text-on-surface-variant">
                            <span>₹0</span>
                            <span id="price-value">₹5,00,000+</span>
                        </div>
                    </div>
                </section>

                <!-- Rating Filter -->
                <section>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface mb-4">Rating</h3>
                    <select id="rating-filter" class="form-select">
                        <option value="">All Ratings</option>
                        <option value="4">4★ & above</option>
                        <option value="3">3★ & above</option>
                    </select>
                </section>

                <!-- Promo Card -->
                <div class="hidden lg:block p-6 rounded-lg relative overflow-hidden bg-primary-fixed/30 group">
                    <div class="relative z-10">
                        <h4 class="font-bold text-primary mb-2">Premium Selection</h4>
                        <p class="text-sm text-on-surface-variant mb-4">Curated products handpicked for quality and value.</p>
                    </div>
                    <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-7xl text-primary/10 group-hover:scale-110 transition-transform">diamond</span>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="lg:col-span-9">
                <div id="shop-products-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-5">
                </div>
                <!-- Pagination -->
                <div id="pagination" class="mt-12 flex items-center justify-center gap-3">
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
