<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shop | Smart Shop</title>
    <meta name="description" content="Browse and search premium products on Smart Shop"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 w-full z-50" id="navbar"></header>

    <main class="pt-24 pb-20 px-4 md:px-8 max-w-7xl mx-auto w-full flex-grow">
        <!-- Search Header -->
        <header class="mb-10 md:mb-14">
            <nav class="flex mb-6 text-[10px] font-bold tracking-[0.2em] uppercase text-slate-400">
                <a href="index.html" class="hover:text-indigo-600 transition-colors">Home</a>
                <span class="mx-3 text-slate-300">/</span>
                <span class="text-slate-600">Shop</span>
            </nav>
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 bg-white p-8 rounded-[2rem] border border-slate-200/60 shadow-sm relative overflow-hidden">
                <div class="absolute right-0 top-0 w-64 h-64 bg-indigo-50/50 blur-3xl rounded-full pointer-events-none translate-x-1/2 -translate-y-1/2"></div>
                <div class="relative z-10">
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-2 font-heading" id="page-title">All Products</h1>
                    <p id="results-count" class="text-slate-500 font-medium text-lg"></p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12 relative">
            
            <!-- Mobile Filter Toggle -->
            <div class="lg:hidden w-full relative z-40">
                <button onclick="const el = document.getElementById('sidebar-filters'); el.classList.toggle('opacity-0'); el.classList.toggle('invisible'); el.classList.toggle('translate-y-[-10px]');" class="w-full bg-white px-5 py-4 rounded-[1.5rem] border border-slate-200/60 shadow-sm flex items-center justify-between font-extrabold text-slate-800 transition-all active:scale-[0.98]">
                    <span class="flex items-center gap-2"><span class="material-symbols-outlined text-indigo-600">tune</span> Filters & Sorting</span>
                    <span class="material-symbols-outlined text-slate-400">expand_more</span>
                </button>
            </div>

            <!-- Sidebar Filters -->
            <aside id="sidebar-filters" class="opacity-0 invisible translate-y-[-10px] absolute top-[72px] left-0 right-0 z-50 bg-white/95 backdrop-blur-2xl p-5 rounded-[2rem] border border-slate-200/60 shadow-2xl transition-all duration-300 lg:opacity-100 lg:visible lg:translate-y-0 lg:relative lg:top-0 lg:bg-transparent lg:p-0 lg:rounded-none lg:border-none lg:shadow-none lg:col-span-3 space-y-4 lg:space-y-6">
                <!-- Category Filter -->
                <section class="bg-slate-50/50 lg:bg-white p-4 lg:p-6 rounded-[1.2rem] lg:rounded-[1.5rem] border border-slate-100 lg:border-slate-200/60 lg:shadow-sm">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3 lg:mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[16px] text-indigo-400">category</span> Category
                    </h3>
                    <select id="category-filter" class="w-full bg-white lg:bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none cursor-pointer hover:bg-slate-50 lg:hover:bg-white transition-colors shadow-sm lg:shadow-none">
                        <option value="All">All Categories</option>
                        <option value="Mobiles">Mobiles</option>
                        <option value="Laptops">Laptops</option>
                        <option value="Clothes">Fashion</option>
                        <option value="Grocery">Grocery</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </section>

                <!-- Sort -->
                <section class="bg-slate-50/50 lg:bg-white p-4 lg:p-6 rounded-[1.2rem] lg:rounded-[1.5rem] border border-slate-100 lg:border-slate-200/60 lg:shadow-sm">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3 lg:mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[16px] text-indigo-400">sort</span> Sort By
                    </h3>
                    <select id="sort-select" class="w-full bg-white lg:bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none cursor-pointer hover:bg-slate-50 lg:hover:bg-white transition-colors shadow-sm lg:shadow-none">
                        <option value="popularity">🔥 Popularity</option>
                        <option value="price-low">📈 Price: Low to High</option>
                        <option value="price-high">📉 Price: High to Low</option>
                        <option value="rating">⭐ Customer Rating</option>
                    </select>
                </section>

                <!-- Price Range -->
                <section class="bg-slate-50/50 lg:bg-white p-4 lg:p-6 rounded-[1.2rem] lg:rounded-[1.5rem] border border-slate-100 lg:border-slate-200/60 lg:shadow-sm">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3 lg:mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[16px] text-indigo-400">payments</span> Price Range
                    </h3>
                    <div class="px-2">
                        <input type="range" id="price-range" min="0" max="500000" value="500000" step="1000" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"/>
                        <div class="flex justify-between mt-4 text-xs font-bold text-slate-500">
                            <span>₹0</span>
                            <span id="price-value" class="text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md border border-indigo-100/50">₹5,00,000+</span>
                        </div>
                    </div>
                </section>

                <!-- Rating Filter -->
                <section class="bg-slate-50/50 lg:bg-white p-4 lg:p-6 rounded-[1.2rem] lg:rounded-[1.5rem] border border-slate-100 lg:border-slate-200/60 lg:shadow-sm">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3 lg:mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[16px] text-indigo-400">star</span> Rating
                    </h3>
                    <select id="rating-filter" class="w-full bg-white lg:bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none cursor-pointer hover:bg-slate-50 lg:hover:bg-white transition-colors shadow-sm lg:shadow-none">
                        <option value="">All Ratings</option>
                        <option value="4">4★ & above</option>
                        <option value="3">3★ & above</option>
                    </select>
                </section>

                <div class="lg:hidden mt-2">
                    <button onclick="document.getElementById('sidebar-filters').classList.add('opacity-0', 'invisible', 'translate-y-[-10px]')" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">check</span> Apply Filters
                    </button>
                </div>

                <!-- Promo Card -->
                <div class="hidden lg:block p-6 rounded-[1.5rem] relative overflow-hidden bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 group shadow-sm mt-8">
                    <div class="relative z-10">
                        <h4 class="font-extrabold text-indigo-900 mb-2 font-heading tracking-tight text-lg">Premium Selection</h4>
                        <p class="text-sm text-indigo-600 font-medium">Curated products handpicked for exceptional quality and value.</p>
                    </div>
                    <span class="material-symbols-outlined absolute -right-6 -bottom-6 text-[100px] text-indigo-200 group-hover:scale-110 group-hover:-rotate-12 transition-all duration-500 drop-shadow-sm">workspace_premium</span>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="lg:col-span-9">
                <div id="shop-products-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-5">
                </div>
                <!-- Pagination -->
                <div id="pagination" class="mt-12 flex items-center justify-center gap-3">
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
