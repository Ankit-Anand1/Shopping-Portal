<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account | Smart Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">

<main class="min-h-screen flex flex-col md:flex-row">
    <section class="hidden md:flex md:w-1/2 relative overflow-hidden">
        <div class="absolute inset-0 z-0 bg-slate-900">
            <div class="absolute inset-0 bg-gradient-to-br from-indigo-600/30 via-purple-600/20 to-slate-900 z-10 mix-blend-overlay"></div>
            <img alt="Shopping" class="w-full h-full object-cover opacity-50" src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1400&q=80&fit=crop"/>
        </div>
        <div class="relative z-10 p-16 flex flex-col justify-between w-full h-full">
            <div><a href="index.html" class="text-3xl font-black tracking-tight text-white font-heading">Smart Shop</a></div>
            <div class="bg-white/10 backdrop-blur-xl p-10 rounded-[2rem] max-w-md border border-white/20 shadow-2xl">
                <div class="w-16 h-16 bg-white/20 rounded-2xl mb-8 flex items-center justify-center backdrop-blur-md border border-white/30">
                    <span class="material-symbols-outlined text-white text-[32px]">auto_awesome</span>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-4 font-heading leading-tight">Join the future of shopping.</h1>
                <p class="text-indigo-100/80 leading-relaxed font-medium">Create your account and unlock premium deals, personalized recommendations, and exclusive member benefits.</p>
            </div>
        </div>
    </section>

    <section class="flex-1 flex flex-col items-center justify-center p-6 md:p-16 lg:p-24 bg-white relative">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-50/50 blur-[100px] rounded-full pointer-events-none translate-x-1/3 -translate-y-1/3"></div>
        <div class="md:hidden mb-12 text-center w-full relative z-10">
            <a href="index.html" class="text-2xl font-black tracking-tight text-indigo-600 font-heading">Smart Shop</a>
        </div>

        <div class="w-full max-w-[440px] space-y-8 relative z-10">
            <div class="text-center md:text-left space-y-3">
                <h2 class="text-4xl font-extrabold tracking-tight text-slate-900 font-heading">Create account</h2>
                <p class="text-slate-500 font-medium">Start your premium shopping journey today.</p>
            </div>

            <div id="signup-error" class="hidden p-4 rounded-xl bg-red-50 text-red-600 text-sm font-bold border border-red-100 flex items-center gap-3 shadow-sm">
                <span class="material-symbols-outlined">error</span>
                <span id="signup-error-text"></span>
            </div>

            <form id="signup-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">First Name</label>
                        <input type="text" id="firstName" required placeholder="Jane" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"/>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Last Name</label>
                        <input type="text" id="lastName" required placeholder="Doe" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"/>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"/>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm font-semibold text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"/>
                </div>
                <button id="signup-btn" type="submit" class="w-full py-5 rounded-[1.2rem] bg-indigo-600 text-white font-bold text-lg tracking-wide shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] hover:bg-indigo-700 hover:-translate-y-1 transition-all text-center flex items-center justify-center gap-2 border-none cursor-pointer group mt-2">
                    Create Account <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>

            <div class="relative flex items-center py-4">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">OR</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button id="google-signup-btn" class="w-full flex items-center justify-center gap-3 py-4 rounded-[1.2rem] bg-white text-slate-700 border-2 border-slate-100 hover:border-slate-200 hover:bg-slate-50 hover:-translate-y-1 hover:shadow-lg transition-all duration-300 font-bold text-sm cursor-pointer active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.27.81-.57z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Sign up with Google
            </button>

            <p class="text-center text-sm font-medium text-slate-500 pt-4">
                Already have an account? <a class="font-bold text-indigo-600 hover:text-indigo-700 transition-colors" href="login.html">Sign In</a>
            </p>
        </div>
    </section>
</main>

<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script type="module">
    import { loginWithGoogle } from './js/firebase-auth.js';

    const errorBox = document.getElementById('signup-error');

    document.getElementById('signup-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        errorBox.classList.add('hidden');
        const btn = document.getElementById('signup-btn');
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin-slow text-lg">sync</span>';
        btn.disabled = true;

        try {
            const profile = await AuthAPI.register(
                document.getElementById('firstName').value,
                document.getElementById('lastName').value,
                document.getElementById('email').value,
                document.getElementById('password').value
            );
            if (typeof showWelcomeAnimation === 'function') {
                showWelcomeAnimation(document.getElementById('firstName').value);
                setTimeout(function() { window.location.href = 'index.html'; }, 2000);
            } else {
                setTimeout(function() { window.location.href = 'index.html'; }, 600);
            }
        } catch(err) {
            errorBox.textContent = err.message || 'Registration failed.';
            errorBox.classList.remove('hidden');
            btn.innerHTML = 'Create Account <span class="material-symbols-outlined text-lg">arrow_forward</span>';
            btn.disabled = false;
        }
    });

    document.getElementById('google-signup-btn').addEventListener('click', async function() {
        const btn = this;
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin-slow text-lg">sync</span> Creating account...';
        btn.disabled = true;

        try {
            const fbUser = await loginWithGoogle();
            const profile = await AuthAPI.googleLogin(fbUser.name, fbUser.email, fbUser.uid, fbUser.photoURL);
            
            if (typeof showWelcomeAnimation === 'function') {
                showWelcomeAnimation(profile.name.split(' ')[0]);
                setTimeout(function() { window.location.href = 'index.html'; }, 2000);
            } else {
                setTimeout(function() { window.location.href = 'index.html'; }, 600);
            }
        } catch(err) {
            errorBox.textContent = err.message || 'Google sign-up failed.';
            errorBox.classList.remove('hidden');
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
